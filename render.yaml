services:
  - type: web
    name: rag-eval-api
    env: docker
    rootDir: apps/api
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: LLM_MODEL
        value: openai/gpt-oss-120b
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: RERANKER_ENABLED
        value: "false"
