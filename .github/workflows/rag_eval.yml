name: RAG Evaluation Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_name:
        description: "Eval run name"
        required: false
        default: "ci_run"

jobs:
  evaluate:
    name: Run RAG Benchmark
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: Install backend dependencies
        working-directory: apps/api
        run: pip install -r requirements.txt

      - name: Write .env for CI
        working-directory: apps/api
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cat > .env <<EOF
          LLM_API_KEY=${LLM_API_KEY}
          LLM_BASE_URL=https://api.groq.com/openai/v1
          LLM_MODEL=openai/gpt-oss-120b
          EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_KEY=${SUPABASE_KEY}
          RETRIEVAL_MODE=hybrid
          RERANKER_ENABLED=false
          EOF

      - name: Run benchmark
        working-directory: apps/api
        run: |
          python scripts/run_eval.py \
            --dataset ../../data/eval/benchmark_v1.json \
            --run-name "${{ github.event.inputs.run_name || format('ci_{0}', github.sha) }}" \
            --output-dir ../../data/eval
        # Exit code 1 = threshold failure → CI fails

      - name: Upload eval artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: data/eval/*.json
          retention-days: 30
